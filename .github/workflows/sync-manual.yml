name: Sincronizar resultados manualmente

on:
  # Este workflow aparece com o botão “Run workflow” na aba Actions.
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install supabase python-dotenv requests

      - name: Rodar sync de resultados
        # Preserva o histórico do erro no log sem marcar a execução inteira como falha.
        continue-on-error: true
        run: python sync_results.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

