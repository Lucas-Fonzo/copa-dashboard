    />

    <path
      d="M32 21V13M42 28l8-5M38 40l5 8M26 40l-5 8M22 28l-8-5"
      fill="none"
      stroke="#07111b"
      stroke-width="3"
      stroke-linecap="round"
    />

    <path
      d="M23 14c-4 2-7 5-9 9M41 14c4 2 7 5 9 9M16 44c3 5 8 8 14 9M48 44c-3 5-8 8-14 9"
      fill="none"
      stroke="#07111b"
      stroke-width="2.5"
      stroke-linecap="round"
      opacity=".95"
    />

    <circle cx="32" cy="32" r="21" fill="none" stroke="#07111b" stroke-width="1.2" opacity=".65"/>
  </g>
</svg>
