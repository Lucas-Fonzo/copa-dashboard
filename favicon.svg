<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Bola de futebol neon">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="70%">
      <stop offset="0" stop-color="#082230"/>
      <stop offset="1" stop-color="#010814"/>
    </radialGradient>
    <linearGradient id="rim" x1="14" y1="12" x2="50" y2="52">
      <stop offset="0" stop-color="#74c900"/>
      <stop offset="0.62" stop-color="#d6aa00"/>
      <stop offset="1" stop-color="#078896"/>
    </linearGradient>
    <filter id="softGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="1.15" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="64" height="64" rx="16" fill="url(#bg)"/>

  <g filter="url(#softGlow)">
    <circle cx="32" cy="32" r="21" fill="#f6fff0" stroke="url(#rim)" stroke-width="3.2"/>

    <polygon
      points="32,21 42,28 38,40 26,40 22,28"
